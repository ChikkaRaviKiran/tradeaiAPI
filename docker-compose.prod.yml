# ═══════════════════════════════════════════════════════════════════════════
# TradeAI — Production Docker Compose (AWS Ubuntu)
# Images are pulled from GitHub Container Registry (GHCR)
# ═══════════════════════════════════════════════════════════════════════════

services:
  # ── PostgreSQL ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: tradeai-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tradeai}
      POSTGRES_USER: ${POSTGRES_USER:-tradeai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - tradeai-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tradeai}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis ──────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: tradeai-redis
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    networks:
      - tradeai-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Backend API + Trading Engine ───────────────────────────────────────
  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/owner/tradeai-backend}:${BACKEND_TAG:-latest}
    container_name: tradeai-backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-tradeai}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-tradeai}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    networks:
      - tradeai-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # ── Frontend (React + Nginx) ───────────────────────────────────────────
  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/owner/tradeai-frontend}:${FRONTEND_TAG:-latest}
    container_name: tradeai-frontend
    networks:
      - tradeai-net
    restart: unless-stopped

  # ── Nginx Reverse Proxy ────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: tradeai-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certbot/conf:/etc/letsencrypt:ro
      - ./nginx/certbot/www:/var/www/certbot:ro
    networks:
      - tradeai-net
    depends_on:
      - backend
    restart: unless-stopped

  # ── Certbot (SSL auto-renewal) ────────────────────────────────────────
  certbot:
    image: certbot/certbot
    container_name: tradeai-certbot
    volumes:
      - ./nginx/certbot/conf:/etc/letsencrypt
      - ./nginx/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done'"
    networks:
      - tradeai-net

networks:
  tradeai-net:
    driver: bridge

volumes:
  pgdata:
  redisdata:

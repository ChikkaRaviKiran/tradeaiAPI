# ═══════════════════════════════════════════════════════════════════════════
# TradeAI — Production Docker Compose (AWS Ubuntu)
# Images are pulled from GitHub Container Registry (GHCR)
# ═══════════════════════════════════════════════════════════════════════════

services:
  # ── PostgreSQL ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: tradeai-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tradeai}
      POSTGRES_USER: ${POSTGRES_USER:-tradeai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - tradeai-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tradeai}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis ──────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: tradeai-redis
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    networks:
      - tradeai-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Backend API + Trading Engine ───────────────────────────────────────
  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/owner/tradeai-backend}:${BACKEND_TAG:-latest}
    container_name: tradeai-backend
    env_file:
      - .env
    environment:
      TZ: Asia/Kolkata
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8001:8000"
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    networks:
      - tradeai-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # ── Frontend (React + Nginx) ───────────────────────────────────────────
  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/owner/tradeai-frontend}:${FRONTEND_TAG:-latest}
    container_name: tradeai-frontend
    ports:
      - "3006:3000"
    networks:
      - tradeai-net
    restart: unless-stopped

networks:
  tradeai-net:
    driver: bridge

volumes:
  pgdata:
  redisdata:

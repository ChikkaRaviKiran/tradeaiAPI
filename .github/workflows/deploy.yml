# ═══════════════════════════════════════════════════════════════════════════
# TradeAI Backend — GitHub Actions CI/CD Pipeline
# Builds backend Docker image, pushes to GHCR, deploys full stack to AWS
# ═══════════════════════════════════════════════════════════════════════════

name: Deploy Backend

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

concurrency:
  group: deploy-backend
  cancel-in-progress: false

jobs:
  build:
    name: Build & Push Backend Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_name: ${{ steps.image.outputs.name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image name (lowercase)
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/tradeai-backend" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Production
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy infra files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USER }}
          key: ${{ secrets.AWS_SSH_KEY }}
          source: "docker-compose.prod.yml,nginx/,scripts/"
          target: /tmp/tradeai-deploy

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          BACKEND_IMAGE: ${{ needs.build.outputs.image_name }}
          IMAGE_TAG: ${{ github.sha }}
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USER }}
          key: ${{ secrets.AWS_SSH_KEY }}
          envs: BACKEND_IMAGE,IMAGE_TAG
          script: |
            set -e

            # Move infra files to /opt/tradeai
            sudo cp -r /tmp/tradeai-deploy/* /opt/tradeai/
            sudo chown -R tradeai:tradeai /opt/tradeai
            rm -rf /tmp/tradeai-deploy

            cd /opt/tradeai

            # Load env vars
            set -a; source .env; set +a

            # Log in to GHCR
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Export for docker-compose
            export BACKEND_IMAGE="${BACKEND_IMAGE}"
            export BACKEND_TAG="${IMAGE_TAG}"

            # Pull and restart backend + infra services
            sudo docker compose -f docker-compose.prod.yml pull backend
            sudo docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Clean up old images
            sudo docker image prune -f

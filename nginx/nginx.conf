# ═══════════════════════════════════════════════════════════════════════════
# TradeAI — Production Nginx Reverse Proxy
# Serves frontend, proxies API, handles SSL via Let's Encrypt
# ═══════════════════════════════════════════════════════════════════════════

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=general:10m rate=60r/m;

    # ── Upstream backends ────────────────────────────────────────────────
    upstream backend_api {
        server backend:8000;
    }

    upstream frontend_app {
        server frontend:3000;
    }

    # ── HTTP → HTTPS redirect ────────────────────────────────────────────
    # Uncomment this block AFTER SSL is set up, and remove the HTTP-only
    # server block below.
    #
    # server {
    #     listen 80;
    #     server_name tradeai.tavabharat.com;
    #
    #     location /.well-known/acme-challenge/ {
    #         root /var/www/certbot;
    #     }
    #
    #     location / {
    #         return 301 https://$host$request_uri;
    #     }
    # }

    # ── HTTPS Server ─────────────────────────────────────────────────────
    # NOTE: Uncomment the ssl_certificate lines AFTER running certbot
    # For initial setup without SSL, use the HTTP-only block below instead
    #
    # server {
    #     listen 443 ssl http2;
    #     server_name tradeai.tavabharat.com;
    #
    #     ssl_certificate /etc/letsencrypt/live/tradeai.tavabharat.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/tradeai.tavabharat.com/privkey.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers HIGH:!aNULL:!MD5;
    #     ssl_prefer_server_ciphers on;
    #
    #     # Security headers
    #     add_header X-Frame-Options "SAMEORIGIN" always;
    #     add_header X-Content-Type-Options "nosniff" always;
    #     add_header X-XSS-Protection "1; mode=block" always;
    #     add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    #
    #     # API routes
    #     location /api/ {
    #         limit_req zone=api burst=10 nodelay;
    #         proxy_pass http://backend_api;
    #         proxy_set_header Host $host;
    #         proxy_set_header X-Real-IP $remote_addr;
    #         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #         proxy_set_header X-Forwarded-Proto $scheme;
    #         proxy_read_timeout 60s;
    #     }
    #
    #     # Frontend (React SPA)
    #     location / {
    #         limit_req zone=general burst=20 nodelay;
    #         proxy_pass http://frontend_app;
    #         proxy_set_header Host $host;
    #         proxy_set_header X-Real-IP $remote_addr;
    #     }
    # }

    # ── HTTP-only Server (use before SSL is set up) ──────────────────────
    # Remove this block and uncomment HTTPS block above after SSL setup
    server {
        listen 80;
        server_name tradeai.tavabharat.com;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # API routes
        location /api/ {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://backend_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Frontend (React SPA)
        location / {
            limit_req zone=general burst=20 nodelay;
            proxy_pass http://frontend_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
